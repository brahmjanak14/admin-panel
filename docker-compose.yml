services:
  postgres:
    image: postgres:16-alpine
    container_name: shyaam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shyaam_db
    ports:
      - "5432:5432"
    volumes:
      - shyaam_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: shyaam-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - shyaam_redis_data:/data

volumes:
  shyaam_pg_data:
  shyaam_redis_data:
